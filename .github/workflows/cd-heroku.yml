name: CD Heroku

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: heroku-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare environment file for tests
        run: |
          {
            echo "DJANGO_SECRET_KEY=test-secret-key"
            echo "DJANGO_DEBUG=True"
            echo "DJANGO_ALLOWED_HOSTS=127.0.0.1,localhost"
            echo "DJANGO_CSRF_TRUSTED_ORIGINS=http://127.0.0.1:8000,http://localhost:8000"
          } > .env

      - name: Run tests
        run: python manage.py test

  merge-to-master:
    name: Merge main to master
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge main into master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main master
          git checkout master
          git merge --no-ff origin/main -m "chore: auto-merge main into master after successful build"
          git push origin master

  deploy:
    name: Deploy to Heroku
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
          HEROKU_EMAIL: ${{ secrets.HEROKU_EMAIL }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        run: |
          for required in HEROKU_API_KEY HEROKU_APP_NAME HEROKU_EMAIL DJANGO_SECRET_KEY; do
            if [ -z "${!required}" ]; then
              echo "Missing required secret: $required"
              exit 1
            fi
          done

      - name: Deploy Docker image to Heroku
        uses: akhileshns/heroku-deploy@v3.12.14
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          usedocker: true

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Configure Heroku environment variables
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_ALLOWED_HOSTS: ${{ vars.DJANGO_ALLOWED_HOSTS }}
          DJANGO_CSRF_TRUSTED_ORIGINS: ${{ vars.DJANGO_CSRF_TRUSTED_ORIGINS }}
        run: |
          allowed_hosts="$DJANGO_ALLOWED_HOSTS"
          csrf_trusted_origins="$DJANGO_CSRF_TRUSTED_ORIGINS"

          if [ -z "$allowed_hosts" ]; then
            allowed_hosts="${HEROKU_APP_NAME}.herokuapp.com"
          fi

          if [ -z "$csrf_trusted_origins" ]; then
            csrf_trusted_origins="https://${HEROKU_APP_NAME}.herokuapp.com"
          fi

          heroku config:set \
            DJANGO_SECRET_KEY="$DJANGO_SECRET_KEY" \
            DJANGO_DEBUG=False \
            DJANGO_ALLOWED_HOSTS="$allowed_hosts" \
            DJANGO_CSRF_TRUSTED_ORIGINS="$csrf_trusted_origins" \
            --app "$HEROKU_APP_NAME"

      - name: Run database migrations
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: heroku run python manage.py migrate --app "$HEROKU_APP_NAME"
